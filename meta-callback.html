<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="no-referrer">
  <title>Connecting to CrossPost Studio</title>
  <style>
    :root { color-scheme: light; font-family: Inter, system-ui, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f5f5fb; color: #18182a; }
    main { width: min(520px, calc(100% - 48px)); padding: 40px; border: 1px solid #e4e4ef; border-radius: 20px; background: white; box-shadow: 0 20px 60px rgba(30, 30, 70, .10); text-align: center; }
    h1 { margin: 0 0 12px; font-size: 1.55rem; }
    p { margin: 0; color: #62627a; line-height: 1.6; }
    a { color: #5d4ee8; }
  </style>
</head>
<body>
  <main>
    <h1>Connecting your Meta account...</h1>
    <p id="status">CrossPost Studio should open automatically. Keep the desktop app running.</p>
  </main>
  <script>
    (() => {
      const query = window.location.search;
      const status = document.getElementById('status');
      if (!query) {
        status.innerHTML = 'No authorization response was received. <a href="./">Return to the CrossPost Studio website</a>.';
        return;
      }
      window.location.replace(`http://localhost:53682/meta/callback/${query}`);
    })();
  </script>
</body>
</html>
